<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorkOS — Mission Control</title>
<style>
  :root{color-scheme:light;
    --ink:#21212b;--muted:#71717f;--line:#eceae4;--line2:#e0ded6;--warm:#f2f0eb;
    --blue:#3694fc;--eblue:#025afb;--indigo:#6100ff;--teal:#36ead0;--emerald:#00e2a0;--coral:#ff5b8a;
    --coraltint:#f8ccd9;--ambertint:#fff2c9;--amberink:#8a6a00;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  body{margin:0;background:var(--warm);color:var(--ink);font-family:var(--font);font-size:14px;
       line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  .wrap{max-width:680px;margin:0 auto;padding:12px 12px 52px}
  button{font:inherit;cursor:pointer}
  button:disabled{opacity:.55;cursor:default}
  button:focus-visible{outline:2px solid var(--eblue);outline-offset:2px}

  /* HERO */
  .hero{position:relative;overflow:hidden;border-radius:24px;padding:22px 20px 22px;margin-bottom:16px;color:#fff;
    background:
      radial-gradient(120% 140% at 88% -20%, rgba(54,234,208,.5) 0%, rgba(54,234,208,0) 46%),
      radial-gradient(130% 130% at 110% 130%, rgba(97,0,255,.75) 0%, rgba(97,0,255,0) 50%),
      linear-gradient(115deg,#191924 0%,#10225f 26%,#025afb 56%,#3694fc 78%,#5f57ff 100%);
    box-shadow:0 24px 54px -30px rgba(16,34,95,.7)}
  .wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:44px;display:block;pointer-events:none}
  .hero-top{position:relative;z-index:2;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .brand{flex:1 1 240px;min-width:0}
  h1{margin:0;font-size:24px;font-weight:600;letter-spacing:-.02em;line-height:1.3}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
         border-radius:20px;padding:4px 10px;margin-left:8px;vertical-align:2px;white-space:nowrap}
  .badge.ro{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.32);color:rgba(255,255,255,.92)}
  .badge.day{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.9);
    letter-spacing:.04em;text-transform:none;margin-left:0}
  .who{margin-top:7px;font-size:12.5px;color:rgba(255,255,255,.82);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  #whoami{font-weight:600;color:#fff}
  .actions{display:flex;align-items:center;gap:8px;margin-left:auto}
  .actions button{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);color:#fff;
    border-radius:13px;padding:10px 16px;font-size:13px;font-weight:600;transition:transform .15s,background .15s}
  .actions button:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}
  .actions button:active{transform:translateY(0)}
  .actions button.primary{background:#fff;border-color:#fff;color:var(--ink);box-shadow:0 8px 20px -8px rgba(0,0,0,.45)}
  .actions button:focus-visible{outline-color:#fff}

  /* HEALTH LINE (hero) */
  .health{position:relative;z-index:2;margin-top:13px;font-size:11.5px;color:rgba(255,255,255,.8);
    background:rgba(0,0,0,.2);border-radius:12px;padding:8px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .health .dot{font-size:11px;color:var(--emerald);line-height:1}
  .health .dot.stale{color:#ffb020}
  #hstatus{font-weight:600;color:#fff}
  .expandbtn{background:transparent;border:0;color:rgba(255,255,255,.92);text-decoration:underline;
    font-size:11px;padding:0 0 0 4px;cursor:pointer}
  .syslist{position:relative;z-index:2;margin-top:8px;background:rgba(0,0,0,.18);border-radius:12px;padding:6px 12px;
    font-size:11.5px;color:rgba(255,255,255,.86)}
  .sysrow{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.08)}
  .sysrow:last-child{border-bottom:0}

  /* FIRST-RUN STRIP */
  .strip{position:relative;overflow:hidden;background:#fff;border:1px solid #f0e0ab;border-radius:16px;
         padding:12px 16px 12px 21px;margin:0 0 12px;font-size:12.5px;font-weight:500;color:#6b5200;
         box-shadow:0 14px 30px -26px rgba(138,106,0,.55)}
  .strip::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;
                 background:linear-gradient(180deg,#ffb020,var(--coral))}

  /* MOJIBAKE WARNING BANNER (#86 — loud, above the board, never blocks it) */
  .banner{position:relative;overflow:hidden;background:#fff;border:1px solid var(--coral);border-radius:14px;
          padding:12px 16px 12px 21px;margin:0 0 12px;font-size:12.5px;font-weight:600;color:#b3204e;
          box-shadow:0 14px 30px -26px rgba(255,91,138,.6)}
  .banner::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--coral)}

  /* STAT TILES */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:0 0 16px}
  .tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 8px;text-align:center;
    box-shadow:0 2px 4px rgba(33,33,43,.03),0 14px 30px -26px rgba(33,33,43,.3)}
  .tile b{display:block;font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
  .tile small{display:block;margin-top:3px;font-size:10px;color:var(--muted);line-height:1.3}
  .tile.warn{border-color:#f0d38a;background:var(--ambertint)}
  .tile.warn b,.tile.warn small{color:var(--amberink)}

  /* TAB BAR (two groups) */
  .tabs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 14px}
  .tablab{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-right:2px}
  .tabsep{width:1px;align-self:stretch;min-height:18px;background:var(--line2);margin:0 4px}
  .tab{border:1px solid var(--line2);background:#fff;color:var(--ink);border-radius:99px;padding:6px 13px;
    font-size:12.5px;font-weight:600;transition:background .13s,border-color .13s}
  .tab:hover{border-color:var(--blue)}
  .tab.on{background:var(--eblue);border-color:var(--eblue);color:#fff}
  .tab .n{margin-left:5px;opacity:.7;font-weight:700}

  /* BODY SUBHEADERS */
  .sh{display:flex;align-items:center;gap:10px;margin:18px 2px 11px;font-size:10px;font-weight:700;
     letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .sh:first-child{margin-top:2px}
  .sh::after{content:"";flex:1;height:1px;background:var(--line2)}
  ul{list-style:none;margin:0;padding:0}

  /* CARDS */
  li.card{position:relative;overflow:hidden;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;background:#fff;
    border:1px solid var(--line);border-radius:18px;padding:14px 14px 14px 19px;margin:0 0 11px;
    box-shadow:0 2px 4px rgba(33,33,43,.03),0 18px 36px -28px rgba(33,33,43,.32)}
  li.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
  li.card.high::before{background:linear-gradient(180deg,var(--coral),var(--indigo))}
  li.card.notable::before{background:linear-gradient(180deg,var(--blue),var(--teal))}
  li.card.act::before{background:linear-gradient(180deg,#ffb020,var(--coral))}
  li.card.q::before{background:linear-gradient(180deg,#9aa0ad,#c9cdd6)}
  li.card.high{box-shadow:0 2px 4px rgba(33,33,43,.04),0 20px 42px -26px rgba(97,0,255,.38)}
  li.card.act{border-color:#f0e0ab}
  li.card.cancelled{opacity:.55;background:var(--warm)}
  li.card.cancelled .title{text-decoration:line-through;color:var(--muted)}
  li.card.done .title{text-decoration:line-through;color:var(--muted)}
  li.card.removed{opacity:.5}
  li.card.removed .title{text-decoration:line-through}
  .rank{flex:none;font-size:11.5px;font-weight:700;color:var(--ink);background:var(--warm);border-radius:10px;
        padding:6px 10px;min-width:34px;text-align:center;white-space:nowrap;margin-top:1px}
  .rank:empty{display:none}
  .grow{flex:1;min-width:0}
  .title{font-size:14.5px;font-weight:600;letter-spacing:-.012em;line-height:1.4}
  .sub{margin-top:5px;font-size:12px;line-height:1.55;color:var(--muted)}
  .chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.02em;padding:3px 10px;
        border-radius:20px;margin:2px 6px 0 0;background:var(--warm);color:var(--muted);
        border:1px solid var(--line2);vertical-align:middle}
  .chip.overdue{background:var(--coraltint);color:#b3204e;border-color:transparent}
  .chip.near{background:var(--ambertint);color:var(--amberink);border-color:transparent}
  li.empty{border:1px dashed var(--line2);border-radius:16px;background:rgba(255,255,255,.55);
           padding:18px 12px;text-align:center;font-size:12.5px;color:var(--muted)}

  /* ROW ACTIONS (task mutations) */
  .rowacts{flex:none;display:flex;gap:6px;margin-top:1px}
  .actbtn{border:1px solid var(--line2);background:#fff;color:var(--ink);border-radius:10px;padding:7px 11px;
    font-size:12px;font-weight:600;white-space:nowrap;transition:background .13s,border-color .13s}
  .actbtn:hover{background:var(--emerald);border-color:var(--emerald)}
  .actbtn:disabled{background:var(--emerald);border-color:var(--emerald);opacity:.6}
  .editform{flex-basis:100%;display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .editin{flex:1 1 150px;min-width:0;border:1px solid var(--line2);border-radius:10px;padding:8px 10px;font:inherit;font-size:13px}
  .editin:focus-visible{outline:2px solid var(--eblue);outline-offset:1px}

  /* MEETING CARD ACTIONS + BRIEF */
  .cardacts{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px}
  .linkbtn{border:0;background:transparent;color:var(--eblue);font-size:12px;font-weight:600;padding:2px 0;cursor:pointer}
  .linkbtn:hover{text-decoration:underline}
  .briefpanel{flex-basis:100%;margin-top:9px;border:1px dashed var(--line2);border-radius:12px;padding:8px 12px;
    background:rgba(255,255,255,.6)}
  .briefrow{display:flex;gap:10px;padding:5px 0;font-size:12px;line-height:1.5}
  .briefrow+.briefrow{border-top:1px solid var(--line)}
  .brieflabel{flex:none;width:112px;font-weight:700;color:var(--muted);font-size:10px;text-transform:uppercase;
    letter-spacing:.03em;padding-top:2px}
  .briefval{flex:1;min-width:0;color:var(--ink)}

  /* LANE SEGMENT */
  .seg{display:inline-flex;background:var(--warm);border:1px solid var(--line2);border-radius:12px;padding:3px;gap:3px;margin:2px 0 4px}
  .segbtn{border:0;background:transparent;color:var(--muted);border-radius:9px;padding:6px 14px;font-size:12px;font-weight:600}
  .segbtn.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(33,33,43,.12)}

  /* PENDING BAR */
  .pendbar{position:sticky;bottom:8px;z-index:5;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    margin:18px 0 0;background:rgba(97,0,255,.08);border:1px solid rgba(97,0,255,.28);border-radius:14px;
    padding:11px 15px;font-size:12.5px;font-weight:600;color:var(--indigo);
    box-shadow:0 14px 30px -22px rgba(97,0,255,.5)}
  .pendtxt{flex:1;min-width:120px}
  .pendtidy{border:1px solid var(--indigo);background:var(--indigo);color:#fff;border-radius:10px;padding:8px 14px;
    font-size:12px;font-weight:700}
  .pendtidy:hover{background:#4d00cc}

  /* TOAST */
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:50;max-width:88%;
    background:var(--ink);color:#fff;border-radius:12px;padding:11px 16px;font-size:12.5px;font-weight:600;
    box-shadow:0 18px 40px -18px rgba(0,0,0,.6)}

  /* PROBE LINE */
  #log{margin-top:24px;min-height:1rem;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
       font-size:10.5px;color:#a1a1ab;white-space:pre-wrap;word-break:break-word}

  @media(min-width:640px){
    .wrap{padding:22px 18px 64px}
    .hero{border-radius:28px;padding:28px 30px 26px;margin-bottom:20px}
    h1{font-size:27px}
    .title{font-size:15px}
    .tile b{font-size:25px}
  }
</style>
</head>

<script id="workos-derive">
"use strict";
// Render-time derivations ONLY (schema/C6): overdue, nearDate, emphasis, staleness, and the
// nested today/tomorrow/week windows are computed here against the viewer's clock and never
// stored in state.
var WORKOS = (function () {
  function pad(n) { return ("0" + n).slice(-2); }
  function dayStr(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function addDays(ymd, n) {
    var p = ymd.split("-").map(Number);
    return dayStr(new Date(p[0], p[1] - 1, p[2] + n));
  }
  function dow(ymd) { var p = ymd.split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]).getDay(); }
  function dueStatus(due, today) {
    if (!due) return null;
    if (due < today) return "overdue";
    if (due <= addDays(today, 2)) return "near";
    return "ok";
  }
  function nextBusinessDay(today) {
    var d = addDays(today, 1);
    if (dow(d) === 6) return addDays(d, 2); // Sat -> Mon
    if (dow(d) === 0) return addDays(d, 1); // Sun -> Mon
    return d;
  }
  // Known signal vocabulary only (schema extension rule: unknown fields are IGNORED)
  var SIGNAL_KEYS = ["revenue", "external", "youLead", "decision", "risk"];
  function emphasis(signals) {
    var n = 0, i;
    if (!signals) return "none";
    for (i = 0; i < SIGNAL_KEYS.length; i++) if (signals[SIGNAL_KEYS[i]] === true) n++;
    return n >= 3 ? "high" : n >= 1 ? "notable" : "none";
  }
  function meetingDay(m) { return String(m.start || "").slice(0, 10); }
  function isStale(generatedISO, nowMs, thresholdMs) {
    var t = Date.parse(generatedISO);
    var lim = (thresholdMs == null) ? 86400000 : thresholdMs; // carried 2-arg call = 24h
    return isFinite(t) ? (nowMs - t) > lim : true;            // missing/unparseable = stale
  }
  function windowFor(ymd, today) {            // nested render-time windows (spec §3)
    if (!ymd) return null;
    if (ymd === today) return "today";
    if (ymd === addDays(today, 1)) return "tomorrow";
    if (ymd > today && ymd <= addDays(today, 6)) return "week";
    return null;                              // week ⊇ tomorrow ⊇ today handled by callers:
  }                                           // inWindow("week") accepts today|tomorrow|week
  function inWindow(ymd, win, today) {
    var w = windowFor(ymd, today);
    if (!w) return false;
    if (win === "week") return true;
    if (win === "tomorrow") return w === "tomorrow";
    return w === "today";
  }
  function attnClass(entry) {                 // legacy string → action (visibility-preserving)
    if (typeof entry === "string") return { cls: "action", text: entry, source: "" };
    return { cls: entry.class === "system" ? "system" : "action",
             text: String(entry.text || ""), source: String(entry.source || "") };
  }
  return { dayStr: dayStr, addDays: addDays, dueStatus: dueStatus,
           nextBusinessDay: nextBusinessDay, emphasis: emphasis,
           meetingDay: meetingDay, isStale: isStale,
           windowFor: windowFor, inWindow: inWindow, attnClass: attnClass };
})();
if (typeof module !== "undefined" && module.exports) module.exports = WORKOS;
</script>

<script id="workos-actions">
"use strict";

    // durable remove that still re-gates at the next tidy (say so honestly); post-reload the
    // snapshot is gone → generic-honest wording. Respects the in-flight lockout: an unsettled
    // mutation owns the task, so the tap is swallowed. Returns true when it HANDLED the tap
    // (caller must not then fall through to a fresh remove); false means this was not a removed row.
    function undoRemoveTap(id, ms) {
      if (!ms.removed) return false;            // not a removed row → caller issues a fresh remove
      if (id && inflight[id]) return true;      // in-flight lockout — swallow, no toggle
      mirrorUndoRemove(id);
      var snap = id ? removeSnap[id] : null;
      toast(!snap ? "undone here — if this remove was sent to chat earlier, decline it at the tidy gate"

    // #88 bridgeless batch: ONE copy-ready prompt over every pending mirror change, as PER-TASK
    // GROUPS + a trailing tidy. Groups are ordered by each task's latest ts; within a group the
    // fixed logical order is update → complete (reopen leaves no mirror entry) → remove (last).
    // The prompt is a SET OF ASKS flowing through the skill's normal gates, not a replay log —
    // per-change click order isn't load-bearing, so per-task grouping is the honest shape and
    // needs no mirror schema growth. Wired to the pending bar ONLY on the clipboard floor (no
    // artifact bridge exists there, so the batch copy-ask IS the commit path). Each line carries
    // the stable taskId verbatim (C14) so the drain applies to the exact task.
    function composeBatch() {
      var done = WOSQ.load(WOSQ.LS.done, []), removed = WOSQ.load(WOSQ.LS.removed, []),
          edits = WOSQ.load(WOSQ.LS.edits, {}), ts = WOSQ.load(WOSQ.LS.ts, {});
      // null-proto lookup maps (#88 class closure): a prototype-named taskId ("hasOwnProperty",

      // read truthy for a task that was never removed/completed and inject a spurious line.
      var isDone = Object.create(null), isRem = Object.create(null), ids = Object.create(null);
      done.forEach(function (id) { isDone[id] = true; ids[id] = true; });

      Object.keys(edits).forEach(function (id) { ids[id] = true; });
      var ordered = Object.keys(ids).sort(function (a, b) {   // groups ordered by each task's latest ts

        }
        if (isDone[id]) lines.push("mark done: " + title + " (" + id + ")");
        if (isRem[id]) lines.push("remove task " + id + ": " + title);
      });

      return lines.join("\n");
    }

    function bridgeReport() {
      var ck = (typeof window !== "undefined" && window.cowork)
        ? "cowork:{" + Object.keys(window.cowork).join(",") + "}" : "no window.cowork";
      return (send ? "bridge: sendPrompt" : "bridge: none (read-only)") + " · action rung " + mutRung + " · " + ck;
    }
    // Poll for late bridge injection (live-test finding: the bridge can appear after script
    // time). Each pass re-asserts the badge + re-chooses the action rung; ends with the probe
    // line so every render self-reports its surface.
    var tries = 0;
    (function pollBridge() {
      if (!send) send = detectSend();
      applyBridgeState();
      if (!send && ++tries < 20) { setTimeout(pollBridge, 250); return; }
      log(bridgeReport());
    })();
  } catch (e) {
    log('board render failed: ' + e.message + ' — say "rebuild my board"');
  }
})();
</script>
